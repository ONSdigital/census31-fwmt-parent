steps:
  - name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    id: Prepare Maven Auth
    entrypoint: bash
    args:
      - -ceu
      - |
        TOKEN="$(gcloud auth print-access-token)"
        {
          echo '<settings>'
          echo '  <servers>'
          echo '    <server>'
          echo '      <id>artifact-registry</id>'
          echo '      <username>oauth2accesstoken</username>'
          echo '      <password>TOKEN_PLACEHOLDER</password>'
          echo '    </server>'
          echo '  </servers>'
          echo '</settings>'
        } > /workspace/settings.xml
        sed -i "s/TOKEN_PLACEHOLDER/$${TOKEN}/" /workspace/settings.xml

  - name: maven:3.9.9-eclipse-temurin-21
    id: Compute Snapshot Version
    entrypoint: bash
    args:
      - -ceu
      - |
        BASE_VERSION="$(mvn -B -ntp help:evaluate -Dexpression=project.version -q -DforceStdout)"
        BASE_VERSION="$(echo "$${BASE_VERSION}" | sed -E 's/-SNAPSHOT$//; s/-rc\.[0-9]+$//')"

        BRANCH_SAFE="$(echo "$${BRANCH_NAME:-feature}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9]+#-#g; s#^-+##; s#-+$##' | cut -c1-20)"
        SHORT_SHA_SAFE="$${SHORT_SHA:-local}"
        EFFECTIVE_VERSION="$${BASE_VERSION}-$${BRANCH_SAFE}-$${SHORT_SHA_SAFE}-SNAPSHOT"

        echo "$${EFFECTIVE_VERSION}" > /workspace/effective-version.txt
        mvn -B -ntp versions:set -DnewVersion="$${EFFECTIVE_VERSION}" -DgenerateBackupPoms=false
        mvn -B -ntp -s /workspace/settings.xml versions:commit

  - name: maven:3.9.9-eclipse-temurin-21
    id: Test
    entrypoint: bash
    args:
      - -ceu
      - |
        mvn -B -ntp -s /workspace/settings.xml clean verify

  - name: maven:3.9.9-eclipse-temurin-21
    id: Publish Snapshot
    entrypoint: bash
    args:
      - -ceu
      - |
        mvn -B -ntp -s /workspace/settings.xml deploy -DskipTests \
          -DaltDeploymentRepository=artifact-registry::default::https://${_REGION}-maven.pkg.dev/${PROJECT_ID}/${_REPO_SUFFIX}

  - name: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    id: Log Published Coordinates
    entrypoint: bash
    args:
      - -ceu
      - |
        VERSION="$(cat /workspace/effective-version.txt)"
        echo "Published: uk.gov.ons.census.fwmt:census31-fwmt-parent:$${VERSION}"
        echo "Repository: ${_REPO_SUFFIX}"

substitutions:
  _REPO_SUFFIX: fwmt-maven-snapshot
  _REGION: europe-west2

options:
  logging: CLOUD_LOGGING_ONLY
